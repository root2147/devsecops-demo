name: DevSecOps Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  sast_scan:
    name: SAST scan with Bandit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: python -m pip install bandit

      - name: Run Bandit SAST scan
        run: bandit -r app

  sca_scan:
    name: SCA scan with pip-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Run pip-audit dependency scan
        run: pip-audit -r requirements.txt

  security_gate:
    name: Security gate
    runs-on: ubuntu-latest
    needs:
      - sast_scan
      - sca_scan
    if: always()

    steps:
      - name: Check scan results
        run: |
          echo "SAST result: ${{ needs.sast_scan.result }}"
          echo "SCA result: ${{ needs.sca_scan.result }}"

          if [ "${{ needs.sast_scan.result }}" != "success" ] || [ "${{ needs.sca_scan.result }}" != "success" ]; then
            echo "Security gate failed. Deployment is blocked."
            exit 1
          fi

          echo "Security gate passed. Deployment is allowed."

  simulated_deployment:
    name: Simulated deployment
    runs-on: ubuntu-latest
    needs:
      - security_gate

    steps:
      - name: Deploy application
        run: echo "Deployment approved because all security checks passed."
